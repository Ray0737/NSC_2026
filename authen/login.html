<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Major Web</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-white text-black">
    <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100">
        <div class="login-card p-5 w-100" style="max-width: 500px;">
            <div class="text-center mb-5">
                <h1 class="fw-light letter-spacing-2">MAJOR WEB</h1>
                <p class="text-muted small">TACTICAL ACCESS SYSTEM</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label for="email" class="form-label small text-uppercase tracking-wider">Email Address</label>
                    <input type="email" class="form-control minimal-input" id="email" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label small text-uppercase tracking-wider">Password</label>
                    <input type="password" class="form-control minimal-input" id="password" required>
                </div>
                <div class="d-grid gap-2 mt-5">
                    <button type="submit" class="btn btn-black py-2">LOGIN</button>
                </div>
                <div class="text-center mt-4">
                    <p class="small text-muted">Don't have an account? <a href="register.html" class="text-black text-decoration-none border-bottom">Register</a></p>
                </div>
            </form>
            <div id="message" class="mt-3 small text-center"></div>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
