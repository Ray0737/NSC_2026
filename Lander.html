<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Major Web</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black">
    <div class="container py-5">
        <header class="d-flex justify-content-between align-items-center mb-5 border-bottom pb-4">
            <div>
                <h1 class="fw-light letter-spacing-2 m-0">MAJOR WEB</h1>
                <p class="text-muted small m-0">COMMAND CENTER</p>
            </div>
            <button id="logoutBtn" class="btn btn-black btn-sm">LOGOUT</button>
        </header>

        <main class="text-center py-5">
            <h2 class="fw-light mb-4">WELCOME, OPERATIVE</h2>
            <div id="userInfo" class="text-muted small">
                <!-- User info will be loaded here -->
                <p>Establishing secure connection...</p>
            </div>
        </main>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './authen/auth.js';

        // Logout logic
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                const { error } = await supabase.auth.signOut();
                if (error) {
                    console.error('Logout error:', error.message);
                } else {
                    window.location.href = 'authen/login.html';
                }
            });
        }

        // Display user info
        async function loadUserInfo() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // Fetch profile data from 'profiles' table
                const { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();

                const userInfoDiv = document.getElementById('userInfo');
                if (profile) {
                    userInfoDiv.innerHTML = `
                        <div class="row justify-content-center">
                            <div class="col-md-6 text-start">
                                <ul class="list-unstyled">
                                    <li class="mb-2"><strong>Callsign:</strong> ${profile.callsign}</li>
                                    <li class="mb-2"><strong>Name:</strong> ${profile.first_name} ${profile.last_name} (${profile.nickname})</li>
                                    <li class="mb-2"><strong>Email:</strong> ${profile.email}</li>
                                    <li class="mb-2"><strong>Telephone:</strong> ${profile.telephone}</li>
                                    <li class="mb-2"><strong>Birthdate:</strong> ${new Date(profile.birthdate).toLocaleDateString()}</li>
                                </ul>
                            </div>
                        </div>
                    `;
                } else {
                    userInfoDiv.textContent = `User: ${user.email}`;
                }
            }
        }
        
        loadUserInfo();
    </script>
</body>
</html>
